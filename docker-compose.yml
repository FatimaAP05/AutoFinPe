services:
  mysql:
    image: mysql:8.4
    container_name: autofinpe-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-autofinpe}
      MYSQL_USER: ${MYSQL_USER:-autofinpe_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-autofinpe_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      TZ: America/Lima
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
